<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cornet | Vue 3 component library for DaisyUI 5</title>
    <meta name="description" content="Cornet is a Vue 3 component library with 55 components built on DaisyUI 5 and Tailwind CSS 4. Fully typed with TypeScript, 35+ themes, free and open source.">
    <meta name="theme-color" content="#ffffff">
    <link rel="canonical" href="https://cornet-ui.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cornet-ui.com/">
    <meta property="og:title" content="Cornet | Vue 3 component library for DaisyUI 5">
    <meta property="og:description" content="55 beautifully crafted Vue 3 components powered by DaisyUI 5 and Tailwind CSS 4. Fully typed, 35+ themes, free and open source.">
    <meta property="og:image" content="https://cornet-ui.com/logoLong.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cornet | Vue 3 component library for DaisyUI 5">
    <meta name="twitter:description" content="55 beautifully crafted Vue 3 components powered by DaisyUI 5 and Tailwind CSS 4.">

    <!-- LCP preload: le navigateur fetch le logo hero avant même que le JS se charge -->
    <link rel="preload" as="image" href="/logoLong.svg" fetchpriority="high">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
